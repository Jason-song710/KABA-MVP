services:
  db:
    image: postgres:16-alpine
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${POSTGRES_DB:-address_notices}
      POSTGRES_USER: ${POSTGRES_USER:-address_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-address_app}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-address_app} -d ${POSTGRES_DB:-address_notices}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://address_app:address_app@db:5432/address_notices}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  db_data:
